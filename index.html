<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Visible Solar Mission v1.2</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // 1000個の星を生成（これがないと背景が寂しくなります）
      AFRAME.registerComponent('star-generator', {
        init: function () {
          for (let i = 0; i < 1000; i++) {
            let star = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 1000;
            let y = (Math.random() - 0.5) * 1000;
            let z = (Math.random() - 0.5) * 1000;
            star.setAttribute('position', {x: x, y: y, z: z});
            star.setAttribute('radius', '0.3'); 
            star.setAttribute('color', '#FFFFFF'); 
            star.setAttribute('shader', 'flat'); 
            this.el.appendChild(star);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #000005">
      
      <a-assets>
        <img id="earth-tex" src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/earth_atmos_2048.jpg?v=1678801912858" crossorigin="anonymous">
        <img id="moon-tex" src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/moon_1024.jpg?v=1678801916321" crossorigin="anonymous">
      </a-assets>

      <a-entity star-generator></a-entity>

      <a-sphere id="sun" position="0 50 100" radius="15" color="#FFD700" shader="flat"></a-sphere>
      <a-light type="directional" position="0 50 100" intensity="1.8" target="#earth"></a-light>
      <a-light type="ambient" intensity="0.2"></a-light>

      <a-sphere id="earth" position="0 0 0" radius="5" src="#earth-tex"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
      </a-sphere>

      <a-sphere id="moon" position="0 0 -150" radius="1.3" src="#moon-tex"></a-sphere>

      <a-entity id="rig" position="15 10 30"
                animation__forward="property: position; from: 15 10 30; to: 15 0 -130; dur: 12000; easing: easeInQuad; startEvents: loaded, animationcomplete__back"
                animation__swing="property: position; from: 15 0 -130; to: -15 0 -130; dur: 4000; easing: linear; startEvents: animationcomplete__forward"
                animation__depth="property: position; from: 15 0 -130; to: 15 0 -170; dur: 2000; dir: alternate; loop: 1; easing: easeInOutSine; startEvents: animationcomplete__forward"
                animation__back="property: position; from: -15 0 -130; to: 15 10 30; dur: 12000; easing: easeOutQuad; startEvents: animationcomplete__swing">
        <a-camera look-controls></a-camera>
      </a-entity>
      
    </a-scene>
  </body>
</html>
