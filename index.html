<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Moon Voyage</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#000005"></a-sky>

      <a-entity stars="count: 5000; radius: 300; depth: 1"></a-entity>

      <a-sphere position="0 0 0" radius="5" color="#2196F3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
      </a-sphere>

      <a-sphere position="0 0 -150" radius="1.3" color="#ECECEC"></a-sphere>

      <a-light type="directional" position="10 5 10" intensity="1.0"></a-light>
      <a-light type="ambient" intensity="0.3"></a-light>

      <a-entity id="rig" position="0 0 15"
                animation="property: position; from: 0 0 15; to: 0 0 -140; 
                           dur: 20000; dir: alternate; loop: true; easing: easeInOutQuad">
        <a-camera look-controls></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
