<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Space Mission v1.7</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // 1. 星空生成（背景が寂しくならないよう1500個に増量）
      AFRAME.registerComponent('star-generator', {
        init: function () {
          for (let i = 0; i < 1500; i++) {
            let star = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 1500;
            let y = (Math.random() - 0.5) * 1500;
            let z = (Math.random() - 0.5) * 1500;
            star.setAttribute('position', {x: x, y: y, z: z});
            star.setAttribute('radius', '0.2'); 
            star.setAttribute('color', '#FFFFFF'); 
            star.setAttribute('shader', 'flat'); 
            this.el.appendChild(star);
          }
        }
      });

      // 2. 強制移動スクリプト（地球出発 -> 月旋回 -> 帰還）
      AFRAME.registerComponent('manual-move', {
        tick: function (time, timeDelta) {
          let t = (time % 25000) / 25000; // 25秒サイクル
          let x, z;
          if (t < 0.45) { 
            let p = t / 0.45; x = 15; z = 20 + (-160 - 20) * p;
          } else if (t < 0.55) {
            let p = (t - 0.45) / 0.1; let angle = Math.PI * p;
            x = 15 * Math.cos(angle); z = -140 - 30 * Math.sin(angle);
          } else {
            let p = (t - 0.55) / 0.45; x = -15; z = -140 + (20 - (-140)) * p;
          }
          this.el.setAttribute('position', {x: x, y: 2, z: z});
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #000000" renderer="colorManagement: true; exposure: 1.2;">
      
      <a-assets>
        <img id="earth-tex" src="Earth.jpg">
        <img id="moon-tex" src="Moon.jpg">
      </a-assets>

      <a-entity star-generator></a-entity>

      <a-sphere position="0 80 150" radius="18" color="#FFFFFF" shader="flat"></a-sphere>
      <a-light type="point" position="0 80 150" intensity="2.2" distance="0" decay="0"></a-light>
      <a-light type="ambient" intensity="0.03"></a-light>

      <a-sphere id="earth" position="0 0 0" radius="5" 
                material="src: #earth-tex; roughness: 1; metalness: 0;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 120000; easing: linear">
      </a-sphere>

      <a-sphere id="moon" position="0 0 -150" radius="1.3" 
                material="src: #moon-tex; roughness: 1; metalness: 0;">
      </a-sphere>

      <a-entity id="rig" manual-move>
        <a-camera look-controls></a-camera>
      </a-entity>
      
    </a-scene>
  </body>
</html>
