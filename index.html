<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Real Solar System VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // 星を1000個生成するスクリプト（安定動作のため継続）
      AFRAME.registerComponent('star-generator', {
        init: function () {
          for (let i = 0; i < 1000; i++) {
            let star = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 800;
            let y = (Math.random() - 0.5) * 800;
            let z = (Math.random() - 0.5) * 800;
            star.setAttribute('position', {x: x, y: y, z: z});
            star.setAttribute('radius', '0.25'); 
            star.setAttribute('color', '#FFFFFF'); 
            star.setAttribute('shader', 'flat'); 
            this.el.appendChild(star);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #000005">
      
      <a-assets>
        <img id="earth-texture" src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/earth_atmos_2048.jpg?v=1678801912858" crossorigin="anonymous">
        <img id="moon-texture" src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/moon_1024.jpg?v=1678801916321" crossorigin="anonymous">
        <img id="sun-texture" src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/sun.jpg?v=1678801918000" crossorigin="anonymous">
      </a-assets>

      <a-entity star-generator></a-entity>

      <a-sphere id="sun-visual" position="100 20 50" radius="15" 
                src="#sun-texture" shader="flat"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 100000; easing: linear">
      </a-sphere>

      <a-light type="directional" position="100 20 50" target="#earth" intensity="1.5"></a-light>
      <a-light type="ambient" intensity="0.1"></a-light>

      <a-sphere id="earth" position="0 0 0" radius="5" src="#earth-texture"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
      </a-sphere>

      <a-sphere id="moon" position="0 0 -150" radius="1.3" src="#moon-texture"></a-sphere>

      <a-entity id="rig" position="0 5 20">
        <a-camera look-controls></a-camera>
      </a-entity>
      
    </a-scene>
  </body>
</html>
