<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Real Scale Solar System v0.2.9</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // 1. 星空ジェネレーター
      AFRAME.registerComponent('star-generator', {
        init: function () {
          for (let i = 0; i < 2000; i++) {
            let star = document.createElement('a-sphere');
            let r = 400000; 
            let theta = Math.random() * Math.PI * 2;
            let phi = Math.acos(Math.random() * 2 - 1);
            star.setAttribute('position', {
              x: r * Math.sin(phi) * Math.cos(theta),
              y: r * Math.sin(phi) * Math.sin(theta),
              z: r * Math.cos(phi)
            });
            star.setAttribute('radius', '400');
            star.setAttribute('shader', 'flat');
            this.el.appendChild(star);
          }
        }
      });

      // 2. 月追従型・スイングバイ移動
AFRAME.registerComponent('manual-move', {
  init: function () {
    const camera = this.el.querySelector('a-camera');
    
    // VRモードに入った時にブラウザが勝手に設定する「高さ」を0に上書き
    this.el.sceneEl.addEventListener('enter-vr', () => {
      // 進入直後と、少し遅延させたタイミングの2回実行して確実に固定します
      if (camera) camera.setAttribute('position', '0 0 0');
      setTimeout(() => {
        if (camera) camera.setAttribute('position', '0 0 0');
      }, 1000); 
    });

    if (camera) {
      camera.setAttribute('camera', 'near', 0.001); // v0022の値を維持
      camera.addEventListener('loaded', () => camera.setAttribute('position', '0 0 0'));
    }
    
    // ...以降、v0022のアンカー取得処理をそのまま継続    
    this.moonEl = document.querySelector('#moon');
    this.anchors = {
      mLeft: document.querySelector('#anchor-left').object3D,
      mBack: document.querySelector('#anchor-back').object3D,
      mRight: document.querySelector('#anchor-right').object3D,
      eRight: document.querySelector('#earth-right').object3D,
      eBack: document.querySelector('#earth-back').object3D,
      eLeft: document.querySelector('#earth-left').object3D
    };
  },

  tick: function (time, timeDelta) {
    // 軌道計算と衝突回避ロジックは V0022 から一切変更していません
    const duration = 40000;
    const t = (time % duration) / duration;
    
    const pMLeft = this.anchors.mLeft.getWorldPosition(new THREE.Vector3());
    const pMBack = this.anchors.mBack.getWorldPosition(new THREE.Vector3());
    const pMRight = this.anchors.mRight.getWorldPosition(new THREE.Vector3());
    const pERight = this.anchors.eRight.getWorldPosition(new THREE.Vector3());
    const pEBack = this.anchors.eBack.getWorldPosition(new THREE.Vector3());
    const pELeft = this.anchors.eLeft.getWorldPosition(new THREE.Vector3());

    const points = [pERight, pMLeft, pMBack, pMRight, pELeft, pEBack, pERight];
    const curve = new THREE.CatmullRomCurve3(points, true);
    curve.tension = 0.15;

    let pos = curve.getPoint(t);
    let finalPos = new THREE.Vector3(pos.x, pos.y, pos.z);

    const distToEarth = finalPos.length();
    if (distToEarth < 1.4) finalPos.normalize().multiplyScalar(1.4);

    const moonWorldPos = this.moonEl.object3D.getWorldPosition(new THREE.Vector3());
    const distToMoon = finalPos.distanceTo(moonWorldPos);
    if (distToMoon < 0.5) {
      let pushDir = new THREE.Vector3().subVectors(finalPos, moonWorldPos).normalize();
      finalPos.copy(moonWorldPos).add(pushDir.multiplyScalar(0.5));
    }

    this.el.setAttribute('position', { x: finalPos.x, y: 0, z: finalPos.z });
  }
});
    </script>
  </head>
  <body>
    <a-scene background="color: #000000" 
         renderer="colorManagement: true;"
         webxr="referenceSpaceType: local">
      
      <a-assets>
        <img id="earth-tex" src="Earth.jpg">
        <img id="moon-tex" src="Moon.jpg">
      </a-assets>

      <a-entity star-generator></a-entity>

      <a-sphere id="sun" position="0 0 23500" radius="109" color="#FFFFFF" shader="flat"></a-sphere>
      <a-light type="directional" position="0 0 23500" intensity="1.5" target="#earth"></a-light>
      <a-light type="ambient" intensity="0.05"></a-light>

      <a-sphere id="earth" position="0 0 0" radius="1" 
                material="src: #earth-tex; roughness: 1; metalness: 0;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
      </a-sphere>

      <a-entity id="moon-orbit-system" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 160000; easing: linear">
        
        <a-sphere id="moon" position="0 0 -60" radius="0.27" 
                  material="src: #moon-tex; roughness: 1; metalness: 0;"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 160000; easing: linear">
        </a-sphere>

<a-entity id="anchor-left" position="-0.35 0 -60"></a-entity>
<a-entity id="anchor-back" position="0 0 -60.35"></a-entity>
<a-entity id="anchor-right" position="0.35 0 -60"></a-entity>
      </a-entity>

<a-entity id="earth-anchors">
  <a-entity id="earth-right" position="1.3 0 0.5"></a-entity>  <a-entity id="earth-back" position="0 0 1.5"></a-entity>     <a-entity id="earth-left" position="-1.3 0 0.5"></a-entity> </a-entity>

<a-entity id="rig" manual-move>
  <a-camera look-controls 
            wasd-controls-enabled="false" 
            position="0 0 0" 
            camera="near: 0.001; far: 500000; height: 0; userHeight: 0;">
  </a-camera>
</a-entity>
      
    </a-scene>
  </body>
</html>
