<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-star-system-component@1.0.0/index.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#000005"></a-sky>

      <a-entity star-system="count: 10000; radius: 500; depth: 0"></a-entity>

      <a-sphere position="0 0 0" radius="5" color="#2196F3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
      </a-sphere>

      <a-sphere position="0 0 -150" radius="1.3" color="#ECECEC"></a-sphere>

      <a-light type="directional" position="10 5 10" intensity="1.0"></a-light>
      <a-light type="ambient" intensity="0.2"></a-light>

      <a-entity id="camera-rig" position="0 0 15">
        <a-camera look-controls></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
