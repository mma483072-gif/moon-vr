<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/milkyway.jpg?v=1678801910000" rotation="0 -90 0"></a-sky>

      <a-sphere position="0 0 0" radius="5" 
                src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/earth_atmos_2048.jpg?v=1678801912858"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
      </a-sphere>

      <a-sphere position="0 0 -150" radius="1.3" 
                src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/moon_1024.jpg?v=1678801916321">
      </a-sphere>

      <a-light type="directional" position="10 5 10" intensity="1.2"></a-light>
      <a-light type="ambient" intensity="0.1"></a-light>

      <a-entity id="rig" position="0 0 15">
        <a-camera look-controls></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
