<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #000010">
      
      <a-entity id="stars">
        <a-sphere position="10 20 -50" radius="0.1" color="white"></a-sphere>
        <a-sphere position="-15 10 -40" radius="0.1" color="white"></a-sphere>
        <a-sphere position="20 -10 -60" radius="0.1" color="white"></a-sphere>
        <a-sphere position="-25 -20 -55" radius="0.1" color="white"></a-sphere>
        <a-sphere position="5 -15 -45" radius="0.1" color="white"></a-sphere>
      </a-entity>

      <a-sphere position="0 0 0" radius="5" color="#2196F3"></a-sphere>

      <a-sphere position="0 0 -150" radius="1.3" color="#CCCCCC"></a-sphere>

      <a-light type="directional" position="1 1 1"></a-light>

      <a-entity position="0 0 15" 
                animation="property: position; from: 0 0 15; to: 0 0 -140; dur: 15000; dir: alternate; loop: true; easing: easeInOutSine">
        <a-camera look-controls></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
