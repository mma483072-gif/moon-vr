<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Moon VR Journey</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#050505"></a-sky>
      <a-entity stars="count: 5000; radius: 500"></a-entity>

      <a-sphere id="earth" position="0 0 0" radius="5" 
                src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/earth_atmos_2048.jpg?v=1678801912858"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 50000; easing: linear">
      </a-sphere>

      <a-sphere id="moon" position="0 0 -100" radius="1.3" 
                src="https://cdn.glitch.global/110904f4-b106-4444-9343-41f22588c218/moon_1024.jpg?v=1678801916321">
      </a-sphere>

      <a-entity id="rig" position="0 0 10">
        <a-camera wasd-controls-enabled="false" look-controls>
          <a-cursor color="#FF0000"></a-cursor>
        </a-camera>
      </a-entity>

      <a-plane position="0 2 5" rotation="0 0 0" width="2" height="1" color="#222"
               event-set__click="_target: #rig; animation.property: position; animation.to: 0 0 -90; animation.dur: 10000"
               onclick="startJourney()">
        <a-text value="START MISSION" align="center" position="0 0 0.1"></a-text>
      </a-plane>
    </a-scene>

    <script>
      // 移動ロジック：地球 -> 月(旋回) -> 地球
      function startJourney() {
        const rig = document.querySelector('#rig');
        
        // 1. 月へ出発
        rig.setAttribute('animation', {
          property: 'position',
          to: '0 0 -90',
          dur: 8000,
          easing: 'easeInQuad'
        });

        // 2. 月に到着したら旋回して戻る（簡易タイマー実装）
        setTimeout(() => {
          // 月の裏側を通るような軌道
          rig.setAttribute('animation', {
            property: 'position',
            to: '20 0 -100',
            dur: 3000,
            easing: 'easeInOutSine'
          });

          setTimeout(() => {
            // 地球へ帰還
            rig.setAttribute('animation', {
              property: 'position',
              to: '0 0 10',
              dur: 8000,
              easing: 'easeOutQuad'
            });
          }, 3500);
        }, 8500);
      }
    </script>
  </body>
</html>
